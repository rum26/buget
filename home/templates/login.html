{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{% static 'icons/favicon-96x96.png' %}" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="{% static 'icons/' %}" />
    <link rel="shortcut icon" href="{% static 'icons/favicon.svg' %}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'icons/apple-touch-icon.png' %}" />
    <meta name="apple-mobile-web-app-title" content="esb" />
    <link rel="manifest" href="{% static 'icons/site.webmanifest' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'style.css' %}">

<title>Вход</title>

</head>
<body>

<h1>Вход</h1>

<form method="post">
    {% csrf_token %}

    <table>
        <tr>
            <th>{{ form.username }}</th>
            <th>Логин</th>
        </tr>
        <tr>
            <th>{{ form.password }}</th>
            <th>Пароль</th>
        </tr>
        <tr>
            <th colspan="2"><button type="submit">Войти</button></th>
        </tr>
        <tr>
            <th colspan="2"><p><a href="{% url 'register' %}">Регистрация</a></p></th>
        </tr>
    </table>

</form>



</body>
