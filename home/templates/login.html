{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{% static 'icons/favicon-96x96.png' %}" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="{% static 'icons/' %}" />
    <link rel="shortcut icon" href="{% static 'icons/favicon.svg' %}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'icons/apple-touch-icon.png' %}" />
    <meta name="apple-mobile-web-app-title" content="esb" />
    <link rel="manifest" href="{% static 'icons/site.webmanifest' %}">

<title>Вход</title>

<style>
:root {
    --bg: #0f172a;
    --text: #f1f5f9;
}


body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 10px;
    padding: 20px;
    max-width: 400px;
    margin: 0 auto;
    text-align: center;
}

h1 {
    color: #5819D9;
    margin-bottom: 30px;
    font-weight: 400;
}


table {
    max-width: 400px;
    border-collapse: collapse;
    width: 100%;
    font-size: 10px;
  }

  th, td {
    border: 1px solid #ccc;         /* тонкая серая рамка */
    padding: 2px;                   /* отступ внутри ячеек */
  }

  th {
    background-color: #A913D7;
  }

 .input {
    color: var(--text);
    max-width: 100px;
    font-size: 10px;
    background: var(--bg);
}


</style>
</head>
<body>
<h1>Вход</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Войти</button>
</form>

<p><a href="{% url 'register' %}">Зарегистрироваться</a></p>

</body>
